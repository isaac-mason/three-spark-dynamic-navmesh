name: Deploy to GitHub Pages

on:
  # Deploy on every push to main, or manually from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel an in-progress one on a newer push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true # pull the real .rad / .glb / .spz assets, not LFS pointer files (if using LFS)

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Served from the project subpath on GitHub Pages; vite.config.ts reads this.
          BASE_PATH: /three-spark-dynamic-navmesh/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
